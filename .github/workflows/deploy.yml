name: Deploy to Production

on:
  push:
    branches:
      - master
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_tests:
        description: "Skip tests (emergency deploy)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      rollback:
        description: "Rollback to previous version"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  GO_VERSION: "1.22"
  BINARY_NAME: server
  DEPLOY_PATH: /opt/be-file-uploader
  # Указываем порт один раз здесь, чтобы не менять его по всему коду
  SSH_PORT: "2222"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' && github.event.inputs.rollback != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Notify Discord - Pipeline Started
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 Pipeline Started\",
                \"color\": 3447003,
                \"description\": \"Building and testing the new changes.\",
                \"fields\": [
                  { \"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"📝 Commit\", \"value\": \"\`${GITHUB_SHA:0:7}\`\", \"inline\": true },
                  { \"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Static analysis
        run: go vet ./...

      - name: Run tests
        id: test_run
        run: go test -v ./...

      - name: Notify Discord - Test Results
        if: always()
        run: |
          if [ "${{ steps.test_run.outcome }}" = "success" ]; then
            TITLE="✅ Tests Passed"
            COLOR=3066993
            DESC="All tests completed successfully."
          else
            TITLE="❌ Tests Failed"
            COLOR=15158332
            DESC="Some tests failed. Check the action logs."
          fi

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"description\": \"$DESC\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"🔗 Logs\", \"value\": \"[View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

  deploy:
    name: Deploy
    needs: test
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          CURRENT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          FILES_CHANGED=$(git diff-tree --no-commit-id --name-only -r $GITHUB_SHA | wc -l)
          echo "current_sha=$CURRENT_SHA" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT

      - name: Set up Go
        if: ${{ github.event.inputs.rollback != 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        if: ${{ github.event.inputs.rollback != 'true' }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -extldflags '-static' -X main.Version=${{ steps.version.outputs.current_sha }}" \
            -o ${{ env.BINARY_NAME }} ./cmd/app/main.go

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          PORT: ${{ env.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Используем маленькую -p для ssh-keyscan
          ssh-keyscan -p $PORT -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload binary
        if: ${{ github.event.inputs.rollback != 'true' }}
        env:
          PORT: ${{ env.SSH_PORT }}
        run: |
          scp -P $PORT -i ~/.ssh/deploy_key \
            ${{ env.BINARY_NAME }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/server-new

      - name: Deploy and restart service
        id: deploy_step
        timeout-minutes: 10
        env:
          PORT: ${{ env.SSH_PORT }}
        run: |
          ROLLBACK_MODE="${{ github.event.inputs.rollback }}"
          DEBUG_MODE="${{ github.event.inputs.debug }}"
          CURRENT_SHA="${{ steps.version.outputs.current_sha }}"
          
          if ! ssh -p $PORT -i ~/.ssh/deploy_key \
              -o ConnectTimeout=10 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "echo 'SSH connection OK'"; then
            echo "SSH connection failed!"
            exit 1
          fi
          
          ssh -p $PORT -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "bash -s $ROLLBACK_MODE $DEBUG_MODE $CURRENT_SHA" << 'ENDSSH' > /tmp/deploy_output.txt 2>&1
          
          ROLLBACK_MODE=$1
          DEBUG_MODE=$2
          CURRENT_SHA=$3
          DEPLOY_PATH=/opt/be-file-uploader
          
          echo "=== Deployment started on port 2222 ==="
          sudo systemctl stop file-uploader
          
          if [ "$ROLLBACK_MODE" = "true" ]; then
            if [ -f $DEPLOY_PATH/bin/server.bak ]; then
              mv $DEPLOY_PATH/bin/server.bak $DEPLOY_PATH/bin/server
            else
              exit 1
            fi
          else
            [ -f $DEPLOY_PATH/bin/server ] && cp $DEPLOY_PATH/bin/server $DEPLOY_PATH/bin/server.bak
            mv /tmp/server-new $DEPLOY_PATH/bin/server
            chmod 750 $DEPLOY_PATH/bin/server
            echo "$CURRENT_SHA" > $DEPLOY_PATH/VERSION
          fi
          
          sudo systemctl start file-uploader
          sleep 5
          
          CPU_LOAD=$(top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4"%"}')
          MEM_USAGE=$(free -m | awk '/Mem:/ { printf "%d/%dMB", $3, $2 }')
          
          echo "cpu_load=$CPU_LOAD"
          echo "mem_usage=$MEM_USAGE"
          echo "deployment_type=deploy"
          echo "=== Deployment completed ==="
          ENDSSH
          
          while IFS='=' read -r key value; do
            if [[ -n "$key" && -n "$value" && "$key" =~ ^[a-zA-Z0-9_]+$ ]]; then
              echo "${key}=${value}" >> $GITHUB_OUTPUT
            fi
          done < /tmp/deploy_output.txt

      - name: Post-deployment smoke tests
        id: smoke_tests
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://uploaderapi.dontkillme.lol/v1/api/public/ping)
          echo "success_rate=100%" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then exit 1; fi

      - name: Notify Discord - Success
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Deploy Successful (Port 2222)\",
                \"color\": 3066993,
                \"fields\": [
                  { \"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"💾 RAM\", \"value\": \"${{ steps.deploy_step.outputs.mem_usage }}\", \"inline\": true },
                  { \"name\": \"💻 CPU\", \"value\": \"${{ steps.deploy_step.outputs.cpu_load }}\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"${{ github.repository }}\" }
              }]
            }"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key