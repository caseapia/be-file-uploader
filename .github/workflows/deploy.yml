name: Deploy to Production

on:
  push:
    branches:
      - master
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_tests:
        description: "Skip tests (emergency deploy)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      rollback:
        description: "Rollback to previous version"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  GO_VERSION: "1.22"
  BINARY_NAME: server
  DEPLOY_PATH: /opt/be-file-uploader

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' && github.event.inputs.rollback != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Notify Discord - Pipeline Started
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 Pipeline Started\",
                \"color\": 3447003,
                \"description\": \"Building and testing the new changes.\",
                \"fields\": [
                  { \"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"📝 Commit\", \"value\": \"\`${GITHUB_SHA:0:7}\`\", \"inline\": true },
                  { \"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Static analysis
        run: go vet ./...

      - name: Run tests
        id: test_run
        run: go test -v ./...

      - name: Notify Discord - Test Results
        if: always()
        run: |
          if [ "${{ steps.test_run.outcome }}" = "success" ]; then
            TITLE="✅ Tests Passed"
            COLOR=3066993
            DESC="All tests completed successfully."
          else
            TITLE="❌ Tests Failed"
            COLOR=15158332
            DESC="Some tests failed. Check the action logs."
          fi

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"description\": \"$DESC\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"🔗 Logs\", \"value\": \"[View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

  deploy:
    name: Deploy
    needs: test
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify Discord - Deploy Started
        run: |
          # Если тесты были пропущены — уведомляем здесь впервые
          if [ "${{ needs.test.result }}" = "skipped" ]; then
            ROLLBACK_MODE="${{ github.event.inputs.rollback }}"
            if [ "$ROLLBACK_MODE" = "true" ]; then
              TITLE="⏮️ Rollback Initiated"
              DESC="Manual rollback to previous version triggered."
            else
              TITLE="⚡ Emergency Deploy Started"
              DESC="Tests skipped. Deploying directly to production."
            fi

            curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"$TITLE\",
                  \"color\": 16776960,
                  \"description\": \"$DESC\",
                  \"fields\": [
                    { \"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                    { \"name\": \"📝 Commit\", \"value\": \"\`${GITHUB_SHA:0:7}\`\", \"inline\": true }
                  ],
                  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                }]
              }"
          fi

      - name: Get version info
        id: version
        run: |
          CURRENT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          COMMIT_TIME=$(git log -1 --pretty=%ci)
          FILES_CHANGED=$(git diff-tree --no-commit-id --name-only -r $GITHUB_SHA | wc -l)

          echo "current_sha=$CURRENT_SHA" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "commit_time=$COMMIT_TIME" >> $GITHUB_OUTPUT
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT

      - name: Set up Go
        if: ${{ github.event.inputs.rollback != 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        if: ${{ github.event.inputs.rollback != 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build binary
        if: ${{ github.event.inputs.rollback != 'true' }}
        run: |
          echo "Building binary..."
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -extldflags '-static' -X main.Version=${{ steps.version.outputs.current_sha }} -X main.BuildTime=$BUILD_TIME" \
            -o ${{ env.BINARY_NAME }} ./cmd/app/main.go

          ls -lh ${{ env.BINARY_NAME }}
          file ${{ env.BINARY_NAME }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.SSH_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Pre-deployment health check
        id: pre_check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://uploaderapi.dontkillme
          .lol/v1/api/public/ping || echo "000")
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 10 https://uploaderapi.dontkillme.lol/v1/api/public/ping || echo "0")

          echo "pre_status=$STATUS" >> $GITHUB_OUTPUT
          echo "pre_response_time=$RESPONSE_TIME" >> $GITHUB_OUTPUT

          if [ "$STATUS" != "200" ]; then
            echo "Warning: Service is not responding before deployment (status: $STATUS)"
          fi

      - name: Upload binary
        if: ${{ github.event.inputs.rollback != 'true' }}
        run: |
          scp -i ~/.ssh/deploy_key \
            ${{ env.BINARY_NAME }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/server-new
          echo "Binary uploaded successfully"

      - name: Deploy and restart service
        id: deploy_step
        timeout-minutes: 10
        run: |
          ROLLBACK_MODE="${{ github.event.inputs.rollback }}"
          DEBUG_MODE="${{ github.event.inputs.debug }}"
          CURRENT_SHA="${{ steps.version.outputs.current_sha }}"

          if ! ssh -i ~/.ssh/deploy_key \
              -o ConnectTimeout=10 \
              -o StrictHostKeyChecking=yes \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "echo 'SSH connection OK'"; then
            echo "SSH connection failed!"
            exit 1
          fi

          set +e
          timeout 300 ssh -i ~/.ssh/deploy_key \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "bash -s $ROLLBACK_MODE $DEBUG_MODE $CURRENT_SHA" << 'ENDSSH' > /tmp/deploy_output.txt 2>&1

          set -e
          ROLLBACK_MODE=$1
          DEBUG_MODE=$2
          CURRENT_SHA=$3
          DEPLOY_PATH=/opt/be-file-uploader
          START_TIME=$(date +%s)

          echo "=== Deployment started ==="

          # Останавливаем сервис
          echo "=== Stopping service ==="
          sudo systemctl stop file-uploader
          sleep 3

          if pgrep -f "bin/server" > /dev/null; then
            echo "Process still running, killing forcefully..."
            sudo pkill -9 -f "bin/server"
            sleep 2
          fi

          APP_PORT=$(grep '^APP_PORT=' $DEPLOY_PATH/.env | cut -d'=' -f2)
          APP_PORT=${APP_PORT:-8080}

          if ss -tuln | grep -q ":$APP_PORT "; then
            echo "Port $APP_PORT still in use, freeing..."
            sudo lsof -ti:$APP_PORT | xargs sudo kill -9 2>/dev/null || true
            sleep 2

            if ss -tuln | grep -q ":$APP_PORT "; then
              echo "CRITICAL: Port $APP_PORT could not be freed!"
              exit 1
            fi
          fi

          echo "Service stopped, port $APP_PORT is free"

          if [ "$ROLLBACK_MODE" = "true" ]; then
            echo "=== ROLLBACK MODE ==="
            if [ -f $DEPLOY_PATH/bin/server.bak ]; then
              mv $DEPLOY_PATH/bin/server.bak $DEPLOY_PATH/bin/server
              chmod 750 $DEPLOY_PATH/bin/server
              # Восстанавливаем версию из бэкапа
              if [ -f $DEPLOY_PATH/VERSION.bak ]; then
                mv $DEPLOY_PATH/VERSION.bak $DEPLOY_PATH/VERSION
              fi
              echo "Rolled back to previous version"
              DEPLOYMENT_TYPE="rollback"
            else
              echo "No backup found for rollback!"
              exit 1
            fi
          else
            if [ -f $DEPLOY_PATH/bin/server ]; then
              cp $DEPLOY_PATH/bin/server $DEPLOY_PATH/bin/server.bak
              # Бэкап текущей версии
              [ -f $DEPLOY_PATH/VERSION ] && cp $DEPLOY_PATH/VERSION $DEPLOY_PATH/VERSION.bak
              echo "Binary backup created"
            fi

            mv /tmp/server-new $DEPLOY_PATH/bin/server
            chmod 750 $DEPLOY_PATH/bin/server

            # Сохраняем версию
            echo "$CURRENT_SHA" > $DEPLOY_PATH/VERSION
            echo "New binary installed — version: $CURRENT_SHA"
            DEPLOYMENT_TYPE="deploy"
          fi

          LOG_TYPE="production"
          if [ "$DEBUG_MODE" = "true" ]; then
            LOG_TYPE="debug"
          fi

          echo "=== Pre-start checks ==="
          ls -lah $DEPLOY_PATH/bin/server
          echo "Binary permissions: $(stat -c '%a' $DEPLOY_PATH/bin/server)"
          echo ".env present: $([ -f $DEPLOY_PATH/.env ] && echo 'yes' || echo 'MISSING')"
          echo "Version: $(cat $DEPLOY_PATH/VERSION 2>/dev/null || echo 'unknown')"

          sudo systemctl daemon-reload
          sudo systemctl start file-uploader
          echo "Service starting..."
          sleep 7

          if ! sudo systemctl is-active --quiet file-uploader; then
            echo "Service failed to start!"
            sudo systemctl status file-uploader --no-pager || true
            sudo journalctl -u file-uploader -n 50 --no-pager

            if [ -f $DEPLOY_PATH/bin/server.bak ]; then
              echo "=== Auto-rollback triggered ==="
              mv $DEPLOY_PATH/bin/server.bak $DEPLOY_PATH/bin/server
              [ -f $DEPLOY_PATH/VERSION.bak ] && mv $DEPLOY_PATH/VERSION.bak $DEPLOY_PATH/VERSION
              sudo systemctl restart file-uploader
              sleep 5
              if sudo systemctl is-active --quiet file-uploader; then
                echo "Rollback successful"
              else
                echo "Rollback also failed!"
              fi
            fi

            exit 1
          fi

          echo "Service is active"

          # Health check
          sleep 3
          MAX_RETRIES=10
          RETRY_COUNT=0
          STATUS="000"

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://uploaderapi.dontkillme.lol/v1/api/public/ping || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $((RETRY_COUNT + 1)))"
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Health check failed (attempt $RETRY_COUNT/$MAX_RETRIES), status: $STATUS"
            sleep 2
          done

          if [ "$STATUS" != "200" ]; then
            echo "Health check failed after $MAX_RETRIES attempts"
            sudo journalctl -u file-uploader -n 100 --no-pager

            if [ -f $DEPLOY_PATH/bin/server.bak ]; then
              echo "=== Auto-rollback triggered ==="
              mv $DEPLOY_PATH/bin/server.bak $DEPLOY_PATH/bin/server
              [ -f $DEPLOY_PATH/VERSION.bak ] && mv $DEPLOY_PATH/VERSION.bak $DEPLOY_PATH/VERSION
              sudo systemctl restart file-uploader
            fi

            exit 1
          fi

          # Собираем метрики
          CPU_LOAD=$(top -bn2 -d 0.5 | grep 'Cpu(s)' | tail -1 | sed 's/.*, *\([0-9.]*\)%* id.*/\1/' | awk '{printf "%.1f%%", 100 - $1}')
          MEM_USAGE=$(free -m | awk '/Mem:/ { printf "%d/%dMB (%.1f%%)", $3, $2, $3*100/$2 }')
          DISK_USAGE=$(df -h / | awk 'NR==2 {print $5}')
          UPTIME=$(uptime -p | sed 's/up //')
          PROCESS_MEM=$(ps -o rss= -C server 2>/dev/null | awk '{sum+=$1} END {printf "%.2f MB", sum/1024}')
          PROCESS_CPU=$(ps -o %cpu= -C server 2>/dev/null | awk '{sum+=$1} END {printf "%.1f%%", sum}')
          LOAD_AVG=$(uptime | awk -F'load average:' '{print $2}' | sed 's/^[ \t]*//')
          CONNECTIONS=$(ss -tn state established '( dport = :443 or sport = :443 )' | wc -l)
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 5 https://uploaderapi.dontkillme.lol/v1/api/public/ping || echo "0")
          DEPLOYED_VERSION=$(cat $DEPLOY_PATH/VERSION 2>/dev/null || echo "unknown")
          END_TIME=$(date +%s)
          DEPLOY_DURATION=$((END_TIME - START_TIME))

          echo "cpu_load=$CPU_LOAD"
          echo "mem_usage=$MEM_USAGE"
          echo "disk_usage=$DISK_USAGE"
          echo "uptime=$UPTIME"
          echo "process_mem=$PROCESS_MEM"
          echo "process_cpu=$PROCESS_CPU"
          echo "load_avg=$LOAD_AVG"
          echo "connections=$CONNECTIONS"
          echo "response_time=${RESPONSE_TIME}s"
          echo "logging_type=$LOG_TYPE"
          echo "deployment_type=$DEPLOYMENT_TYPE"
          echo "deploy_duration=${DEPLOY_DURATION}s"
          echo "deployed_version=$DEPLOYED_VERSION"
          echo "=== Deployment completed successfully ==="
          ENDSSH

          SSH_EXIT_CODE=$?
          set -e

          echo "=== SSH Exit Code: $SSH_EXIT_CODE ==="
          cat /tmp/deploy_output.txt

          if [ $SSH_EXIT_CODE -ne 0 ]; then
            echo "SSH command failed with exit code $SSH_EXIT_CODE"
            exit 1
          fi

          while IFS='=' read -r key value; do
            if [ -z "$key" ] || [ -z "$value" ]; then continue; fi
            if echo "$key" | grep -qE '^[a-zA-Z_][a-zA-Z0-9_]*$'; then
              clean_value=$(echo "$value" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              echo "${key}=${clean_value}" >> $GITHUB_OUTPUT
            fi
          done < /tmp/deploy_output.txt

      - name: Post-deployment smoke tests
        id: smoke_tests
        run: |
          PING_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://uploaderapi.dontkillme.lol/v1/api/public/ping)
          echo "ping_test=$PING_STATUS" >> $GITHUB_OUTPUT

          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 10 https://uploaderapi.dontkillme.lol/v1/api/public/ping)
          echo "response_time_test=${RESPONSE_TIME}s" >> $GITHUB_OUTPUT

          SUCCESS_COUNT=0
          for i in {1..10}; do
            if [ "$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://uploaderapi.dontkillme.lol/v1/api/public/ping)" = "200" ]; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            fi
            sleep 0.2
          done

          SUCCESS_RATE=$((SUCCESS_COUNT * 10))
          echo "success_rate=${SUCCESS_RATE}%" >> $GITHUB_OUTPUT

          # Явно падаем если success rate ниже 80%
          if [ $SUCCESS_COUNT -lt 8 ]; then
            echo "Smoke tests failed: success rate ${SUCCESS_RATE}% is below 80%"
            exit 1
          fi

      - name: Notify Discord - Success
        if: success()
        run: |
          escape_json() { echo "$1" | sed 's/\\/\\\\/g; s/"/\\"/g; s/\n/\\n/g'; }

          CPU_LOAD=$(escape_json "${{ steps.deploy_step.outputs.cpu_load }}")
          MEM_USAGE=$(escape_json "${{ steps.deploy_step.outputs.mem_usage }}")
          DISK_USAGE=$(escape_json "${{ steps.deploy_step.outputs.disk_usage }}")
          UPTIME=$(escape_json "${{ steps.deploy_step.outputs.uptime }}")
          PROCESS_MEM=$(escape_json "${{ steps.deploy_step.outputs.process_mem }}")
          PROCESS_CPU=$(escape_json "${{ steps.deploy_step.outputs.process_cpu }}")
          LOAD_AVG=$(escape_json "${{ steps.deploy_step.outputs.load_avg }}")
          CONNECTIONS=$(escape_json "${{ steps.deploy_step.outputs.connections }}")
          RESPONSE_TIME=$(escape_json "${{ steps.deploy_step.outputs.response_time }}")
          DEPLOY_DURATION=$(escape_json "${{ steps.deploy_step.outputs.deploy_duration }}")
          LOG_TYPE=$(escape_json "${{ steps.deploy_step.outputs.logging_type }}")
          DEPLOYMENT_TYPE=$(escape_json "${{ steps.deploy_step.outputs.deployment_type }}")
          DEPLOYED_VERSION=$(escape_json "${{ steps.deploy_step.outputs.deployed_version }}")
          COMMIT_MSG=$(escape_json "${{ steps.version.outputs.commit_msg }}")
          FILES_CHANGED="${{ steps.version.outputs.files_changed }}"
          SUCCESS_RATE="${{ steps.smoke_tests.outputs.success_rate }}"

          if [ "$DEPLOYMENT_TYPE" = "rollback" ]; then
            TITLE="⏮️ Rollback Successful"
            COLOR=16776960
          else
            TITLE="✅ Deploy Successful"
            COLOR=3066993
          fi

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"🌐 Service\", \"value\": \"[uploaderapi.dontkillme.lol](https://uploaderapi.dontkillme.lol)\", \"inline\": true },
                  { \"name\": \"🛠️ Mode\", \"value\": \"$LOG_TYPE\", \"inline\": true },
                  { \"name\": \"⏱️ Duration\", \"value\": \"$DEPLOY_DURATION\", \"inline\": true },
                  { \"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"📝 Version\", \"value\": \"\`$DEPLOYED_VERSION\`\", \"inline\": true },
                  { \"name\": \"📊 Files Changed\", \"value\": \"$FILES_CHANGED\", \"inline\": true },
                  { \"name\": \"💻 CPU\", \"value\": \"$CPU_LOAD\", \"inline\": true },
                  { \"name\": \"💾 RAM\", \"value\": \"$MEM_USAGE\", \"inline\": true },
                  { \"name\": \"💿 Disk\", \"value\": \"$DISK_USAGE\", \"inline\": true },
                  { \"name\": \"🔥 Load Avg\", \"value\": \"$LOAD_AVG\", \"inline\": true },
                  { \"name\": \"💎 App RAM\", \"value\": \"$PROCESS_MEM\", \"inline\": true },
                  { \"name\": \"⚡ App CPU\", \"value\": \"$PROCESS_CPU\", \"inline\": true },
                  { \"name\": \"🔌 Connections\", \"value\": \"$CONNECTIONS\", \"inline\": true },
                  { \"name\": \"⏲️ Response\", \"value\": \"$RESPONSE_TIME\", \"inline\": true },
                  { \"name\": \"✅ Success Rate\", \"value\": \"$SUCCESS_RATE\", \"inline\": true },
                  { \"name\": \"⏰ Uptime\", \"value\": \"$UPTIME\", \"inline\": false },
                  { \"name\": \"📋 Message\", \"value\": \"$COMMIT_MSG\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"${{ github.repository }}\" },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

      - name: Notify Discord - Failure
        if: failure()
        run: |
          if [ "${{ steps.deploy_step.outcome }}" = "failure" ]; then
            STEP_FAILED="deployment"
            ERROR_DESC="The deployment process encountered an error during service restart or health check."
          elif [ "${{ steps.smoke_tests.outcome }}" = "failure" ]; then
            STEP_FAILED="smoke tests"
            ERROR_DESC="Deployment succeeded but smoke tests failed (success rate below 80%)."
          else
            STEP_FAILED="unknown"
            ERROR_DESC="The deployment process encountered an error."
          fi

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"<@531462564304125962>\",
              \"embeds\": [{
                \"title\": \"❌ Deployment Failed\",
                \"color\": 15158332,
                \"description\": \"$ERROR_DESC\",
                \"fields\": [
                  { \"name\": \"🚨 Failed Step\", \"value\": \"$STEP_FAILED\", \"inline\": true },
                  { \"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"📝 Commit\", \"value\": \"\`${{ steps.version.outputs.current_sha }}\`\", \"inline\": true },
                  { \"name\": \"🔗 Logs\", \"value\": \"[View Action Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false }
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key